{{ define "book.html" }}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page-shell page-shell-narrow">
      <header class="topbar">
        <a class="brand" href="/app"><span class="brand-mark">M</span><span class="brand-name">moco</span></a>
      </header>
      <main>
        <section class="book-detail-card">
          <p class="section-label">{{ .Book.Format }}</p>
          <h1 class="dashboard-title">{{ .Book.Title }}</h1>
          <p class="auth-copy">{{ if .Book.Author }}{{ .Book.Author }}{{ else }}Unknown author{{ end }}</p>
          <div class="book-panel-actions">
            <a class="button primary" href="/api/v1/books/{{ .Book.ID }}/download">Download original</a>
            {{ if .Book.DerivedEPUBPath }}<a class="button secondary" href="/api/v1/books/{{ .Book.ID }}/converted.epub">Download EPUB</a>{{ end }}
            <a class="button subtle" href="/app">Back to shelf</a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
{{ end }}
