services:
  moco:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moco
    restart: unless-stopped
    ports:
      # Bound to 127.0.0.1 only — public access goes through nginx.
      # Override MOCO_PORT in .env if 8666 is taken on the host.
      - "127.0.0.1:${MOCO_PORT:-8666}:8080"
    env_file:
      - .env
    environment:
      MOCO_ADDR: ":8080"
      MOCO_DATA_DIR: "/app/var"
    volumes:
      # Persists the SQLite database and (when MOCO_STORAGE=local) book files.
      # When using R2 you can remove this volume — files live in the bucket.
      - ./var:/app/var
