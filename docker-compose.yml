services:
  moco:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moco
    restart: unless-stopped
    ports:
      # Host bind + port come from .env so multi-app servers can avoid
      # collisions without editing this file. Defaults bind to 127.0.0.1
      # only — set MOCO_HOST_BIND=0.0.0.0 if you really want public exposure.
      - "${MOCO_HOST_BIND:-127.0.0.1}:${MOCO_HOST_PORT:-6666}:8080"
    env_file:
      - .env
    environment:
      MOCO_ADDR: ":8080"
      MOCO_DATA_DIR: "/app/var"
    volumes:
      # Persists the SQLite database and (when MOCO_STORAGE=local) book files.
      # When using R2 you can remove this volume — files live in the bucket.
      - ./var:/app/var
